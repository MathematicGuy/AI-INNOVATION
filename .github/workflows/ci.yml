name: Template CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend-checks:
    name: Backend Checks (Python)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint and Format Check (Ruff)
        run: |
          ruff check src tests
          ruff format --check src tests

      - name: Type Check (Mypy)
        run: |
          mypy src

      - name: Run Tests (Pytest)
        run: |
          pytest -q

  frontend-checks:
    name: Frontend Checks (Node.js)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: |
          cd frontend
          npm ci

      - name: Lint Check (Oxlint)
        run: |
          cd frontend
          npm run lint

      - name: Production Build
        run: |
          cd frontend
          npm run build
